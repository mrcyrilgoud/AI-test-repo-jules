<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pomodoro Timer Settings</title>
    <link rel="stylesheet" href="options.css">
</head>
<body>
    <div class="container">
        <h1>Settings</h1>
        <form id="settings-form">
            <div class="form-group">
                <label for="pomodoro-duration">Pomodoro Duration (minutes)</label>
                <input type="number" id="pomodoro-duration" min="1" required>
            </div>
            <div class="form-group">
                <label for="short-break-duration">Short Break Duration (minutes)</label>
                <input type="number" id="short-break-duration" min="1" required>
            </div>
            <div class="form-group">
                <label for="long-break-duration">Long Break Duration (minutes)</label>
                <input type="number" id="long-break-duration" min="1" required>
            </div>
            <div class="form-group">
                <label for="sessions-before-long-break">Sessions before Long Break</label>
                <input type="number" id="sessions-before-long-break" min="1" required>
            </div>
            <button type="submit">Save</button>
        </form>
    </div>
    <script src="options.js"></script>
</body>
</html>
