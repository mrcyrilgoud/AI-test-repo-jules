<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Email Command Center</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Custom CSS -->
    <style>
        .urgency-high { background-color: #ffe6e6; }
        .value-high { border-left: 5px solid #ffc107; }
        .table-hover tbody tr:hover { background-color: #f8f9fa; cursor: pointer; }
        .details-row { background-color: #fcfcfc; display: none; }
        .score-badge { font-weight: bold; width: 40px; display: inline-block; text-align: center; }
        .loading-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255,255,255,0.8); z-index: 1000;
            display: flex; justify-content: center; align-items: center;
        }
    </style>
</head>
<body class="bg-light">

    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
        <div class="container">
            <a class="navbar-brand" href="#">📧 AI Command Center</a>
            <div class="d-flex">
                <a href="/logout" class="btn btn-outline-light btn-sm">Logout</a>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <div class="container">
        <div class="row mb-3">
            <div class="col">
                <h2 class="h4">Inbound Intelligence</h2>
                <p class="text-muted">Analyzing your inbox for high-value and high-severity items.</p>
            </div>
            <div class="col-auto">
                <button id="refreshBtn" class="btn btn-primary">Refresh Analysis</button>
            </div>
        </div>

        <div class="card shadow-sm">
            <div class="card-body p-0">
                <table class="table table-hover mb-0">
                    <thead class="table-light">
                        <tr>
                            <th scope="col">Score</th>
                            <th scope="col">Severity</th>
                            <th scope="col">Value</th>
                            <th scope="col">Subject & Sender</th>
                            <th scope="col">Action</th>
                        </tr>
                    </thead>
                    <tbody id="emailTableBody">
                        <!-- Rows will be injected here via JS -->
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- Loading Spinner -->
    <div id="loading" class="loading-overlay">
        <div class="text-center">
            <div class="spinner-border text-primary" role="status"></div>
            <p class="mt-2">Analyzing Inbox with Gemini AI...</p>
        </div>
    </div>

    <!-- Bootstrap Bundle JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <!-- Main App Logic -->
    <script src="/static/js/main.js"></script>
</body>
</html>
