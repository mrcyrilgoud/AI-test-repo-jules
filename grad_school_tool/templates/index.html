{% extends "base.html" %} {% block title %}Home{% endblock %} {% block content
%}
<div class="jumbotron">
    <h1 class="display-4">Grad School Program Analyzer</h1>
    <p class="lead">
        Enter the universities you are interested in, one per line.
    </p>
    <hr class="my-4" />
    <form action="/submit" method="post">
        <div class="form-group">
            <textarea
                class="form-control"
                name="universities"
                rows="10"
                placeholder="e.g.&#10;UCLA&#10;Stanford"
            ></textarea>
        </div>
        <button type="submit" class="btn btn-primary">Analyze</button>
    </form>
</div>
{% endblock %}
