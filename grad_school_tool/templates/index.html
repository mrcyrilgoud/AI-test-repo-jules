{% extends "base.html" %}
{% block title %}Home{% endblock %}

{% block content %}
<div class="card">
    <h1>Program Analyzer</h1>
    <p class="lead">
        Enter the universities you are interested in, one per line.
    </p>

    <hr class="divider" />

    <form action="/submit" method="post" onsubmit="this.querySelector('button').classList.add('loading')">
        <div class="form-group">
            <textarea class="form-control" name="universities" rows="8" placeholder="e.g.&#10;UCLA&#10;Stanford"
                required></textarea>
        </div>
        <div class="button-group"
            style="display: flex; gap: var(--spacing-sm); justify-content: center; flex-wrap: wrap;">
            <button type="submit" name="action" value="visualize" class="btn btn-primary">Visualize Only</button>
            <button type="submit" name="action" value="download" class="btn btn-secondary">Download CSV</button>
            <button type="submit" name="action" value="save_local" class="btn btn-secondary">Save to Local</button>
            <button type="submit" name="action" value="save" class="btn btn-secondary">Save to Cloud</button>
        </div>
    </form>
</div>
{% endblock %}
